name: Generate RSS
on:
  # schedule:
  #   - cron: '0 1 * * 1-5'
  #   - cron: '0 3 * * 1-5'
  #   - cron: '0 5 * * 1-5'
  #   - cron: '0 7 * * 1-5'
  #   - cron: '0 9 * * 1-5'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: node generate-rss.mjs
      - name: Commit and push feed.xml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add feed.xml
          git diff --cached --quiet || git commit -m "Update feed.xml"
          git push
